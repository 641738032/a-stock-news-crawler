# A股新闻爬虫定时任务（已适配：在有数据变更时创建新分支并提交，随后创建 PR）
name: A股新闻爬虫定时任务

on:
  schedule:
    # 每小时执行一次 (UTC 时间，北京时间需要 -8 小时)
    - cron: '0 * * * *'

  # 支持手动触发
  workflow_dispatch:
    
permissions:
  contents: write  # 需要写入仓库的权限用于创建分支和提交

jobs:
  crawler:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: 设置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install chromium

      - name: 运行爬虫
        env:
          TZ: Asia/Shanghai
          WECHAT_WEBHOOK_URL: ${{ secrets.WECHAT_WEBHOOK_URL }}
          EMAIL_SMTP_HOST: ${{ secrets.EMAIL_SMTP_HOST }}
          EMAIL_SMTP_PORT: ${{ secrets.EMAIL_SMTP_PORT }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENTS: ${{ secrets.EMAIL_RECIPIENTS }}
        run: |
          echo "当前工作目录: $(pwd)"
          echo "目录内容:"
          ls -la
          python src/main.py
          echo ""
          echo "爬虫运行后的目录内容:"
          ls -la

      - name: 诊断数据文件
        run: |
          echo "=== 检查 data 目录 ==="
          ls -lh data/ || echo "data 目录不存在"
          echo ""
          echo "=== 检查财联社数据文件 ==="
          if [ -f "data/财联社_news.json" ]; then
            echo "✓ 文件存在"
            echo "文件大小: $(wc -c < data/财联社_news.json) 字节"
            echo "前 5 条新闻:"
            python3 -c "import json; data = json.load(open('data/财联社_news.json')); print(f'总共 {len(data)} 条新闻'); print(f'最新: {data[0][\"publish_time\"] if data else \"无\"}')"
          else
            echo "✗ 文件不存在"
          fi

      - name: Configure git user
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Commit and push data files (create branch)
        id: commit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 生成分支名并导出
          BRANCH="data-updates/$(date +'%Y%m%d%H%M%S')"
          echo "branch=${BRANCH}" >> $GITHUB_OUTPUT

          # 新建分支
          git checkout -b "${BRANCH}"

          # 添加文件（按需调整路径）
          git add data/ || true

          # 如果没有变更，输出 committed=false
          if git diff --staged --quiet; then
            echo "No changes to commit"
            echo "committed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "chore: 更新爬虫数据 $(date +'%Y-%m-%d %H:%M:%S') [skip ci]"
            # push 到远端新分支
            git push --set-upstream origin HEAD
            echo "committed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request for data changes
        if: steps.commit.outputs.committed == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ steps.commit.outputs.branch }}
          base: main
          title: chore: 更新爬虫数据
          body: |
            自动化提交：包含爬虫生成的 data/ 目录。
            由 workflow 生成，运行ID: ${{ github.run_id }}
          labels: automated,data
          commit-message: chore: 更新爬虫数据 (from workflow ${{ github.run_id }}) [skip ci]