name: A股新闻爬虫定时任务

on:
  schedule:
    # 每小时执行一次 (UTC 时间，北京时间需要 -8 小时)
    # 北京时间每小时执行，需要在 UTC 时间的每小时执行
    - cron: '0 * * * *'

  # 支持手动触发
  workflow_dispatch:
    
permissions:
  contents: write  # 需要写入仓库的权限用于创建分支和提交

jobs:
  crawler:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install chromium

      - name: 运行爬虫
        env:
          TZ: Asia/Shanghai
          WECHAT_WEBHOOK_URL: ${{ secrets.WECHAT_WEBHOOK_URL }}
          EMAIL_SMTP_HOST: ${{ secrets.EMAIL_SMTP_HOST }}
          EMAIL_SMTP_PORT: ${{ secrets.EMAIL_SMTP_PORT }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENTS: ${{ secrets.EMAIL_RECIPIENTS }}
        run: |
          echo "当前工作目录: $(pwd)"
          echo "目录内容:"
          ls -la
          python src/main.py
          echo ""
          echo "爬虫运行后的目录内容:"
          ls -la

      - name: 诊断数据文件
        run: |
          echo "=== 检查 data 目录 ==="
          ls -lh data/ || echo "data 目录不存在"
          echo ""
          echo "=== 检查财联社数据文件 ==="
          if [ -f "data/财联社_news.json" ]; then
            echo "✓ 文件存在"
            echo "文件大小: $(wc -c < data/财联社_news.json) 字节"
            echo "前 5 条新闻:"
            python3 -c "import json; data = json.load(open('data/财联社_news.json')); print(f'总共 {len(data)} 条新闻'); print(f'最新: {data[0][\"publish_time\"] if data else \"无\"}')"
          else
            echo "✗ 文件不存在"
          fi

      - name: 提交数据变更
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          # 检查是否有变更
          echo "检查 data/ 目录变更..."
          git diff --name-only

          if git diff --quiet; then
            echo "没有数据变更"
          else
            echo "发现数据变更，准备提交..."
            git add data/
            git commit -m "chore: 更新爬虫数据 $(date +'%Y-%m-%d %H:%M:%S')"
            echo "准备 push 数据..."
            git push https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
            echo "✅ 数据已成功 push"
          fi

      - name: 上传日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crawler-logs
          path: logs/
          retention-days: 7
